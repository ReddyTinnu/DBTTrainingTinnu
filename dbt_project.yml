# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models

name: 'dbttrainingtinnu'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# Directories where dbt looks for project files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Seed configuration
seeds:
  DBTTrainingTinnu:
    +schema: raw

# Model configuration
models:
  DBTTrainingTinnu:
    Staging:
      +materialized: view
      +schema: staging